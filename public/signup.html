<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Short</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card shadow-lg">
        <div class="text-center mb-4">
          <a href="/" class="text-decoration-none fw-bold fs-3 text-light"
            >Shorter</a
          >
          <p class="text-secondary mt-2 mb-0">Create your new account</p>
        </div>

        <form action="/signup" method="post">
          <div class="mb-3">
            <label class="form-label text-secondary small">Full Name</label>
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="John Doe"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary small">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="name@email.com"
              required
            />
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary small">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Create a strong password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary w-100 rounded-pill fw-medium mb-4"
          >
            Sign Up
          </button>

          <div class="text-center text-secondary small">
            Already have an account?
            <a href="/login" class="text-primary text-decoration-none fw-medium"
              >Log in here</a
            >
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
