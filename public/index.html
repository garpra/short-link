<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Short - Modern URL Shortener</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent pt-4">
      <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/"
          ><i class="bi bi-link-45deg text-primary"></i> Sho.rt</a
        >
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center" id="user-nav">
            <li class="nav-item ms-lg-3">
              <a class="nav-link" href="/login">Login</a>
            </li>
            <li class="nav-item ms-lg-2">
              <a class="btn btn-primary rounded-pill px-4" href="/signup"
                >Sign Up</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section
      class="hero-section text-center pb-4 mb-5"
      style="min-height: auto; padding-top: 80px"
    >
      <div class="container">
        <h1 class="display-4 fw-bold mb-3">Shorten Your Links in Seconds</h1>
        <p class="lead text-secondary mb-5">
          A simple tool to turn long URLs into clean, shareable links
        </p>

        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <form
              class="d-flex gap-2 p-2 bg-dark rounded-pill border border-secondary shadow-lg"
            >
              <input
                type="url"
                class="form-control form-control-lg border-0 bg-transparent text-light shadow-none"
                placeholder="Paste your link here..."
                required
              />
              <button
                class="btn btn-primary rounded-pill px-4 fw-medium"
                type="button"
              >
                Shorten
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <section class="container mb-5 pb-4" id="table-container" hidden>
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div
            class="card bg-transparent border-secondary rounded-4 shadow-sm"
            style="background-color: #121212 !important"
          >
            <div
              class="card-header border-secondary p-4 d-flex justify-content-between align-items-center"
            >
              <h5 class="fw-semibold m-0">Your Latest Links</h5>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table
                  class="table table-dark table-hover align-middle mb-0"
                  style="--bs-table-bg: transparent"
                >
                  <thead>
                    <tr>
                      <th
                        class="text-secondary fw-normal px-4 pt-3 pb-3 border-secondary"
                      >
                        Short Link
                      </th>
                      <th
                        class="text-secondary fw-normal pt-3 pb-3 border-secondary"
                      >
                        Original URL
                      </th>
                      <th
                        class="text-secondary fw-normal text-center pt-3 pb-3 border-secondary"
                      >
                        Clicks
                      </th>
                      <th
                        class="text-secondary fw-normal text-end px-4 pt-3 pb-3 border-secondary"
                      >
                        Actions
                      </th>
                    </tr>
                  </thead>
                  <tbody id="urls-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const userNav = document.getElementById("user-nav");
        const tableContainer = document.getElementById("table-container");

        const response = await fetch("/api/user/status");
        const data = await response.json();

        if (data.loggedIn) {
          userNav.innerHTML = `
              <li class="nav-item">
                <span class="nav-link">Welcome, ${data.user.name.split(" ")[0]}</span>
              </li>
              <li class="nav-item ms-lg-2">
                <button id="logout-button" class="btn btn-outline-danger rounded-pill px-4">Logout</button>
              </li>
            `;
          tableContainer.hidden = !tableContainer.hidden;

          const fetchUrls = await fetch("/api/user/urls");
          const urls = await fetchUrls.json();

          const tableBody = document.getElementById("urls-table-body");
          tableBody.innerHTML = "";

          urls.forEach((url) => {
            const date = new Date(url.created_at);
            const tableRow = `
              <tr>
                <td class="px-4 py-3 border-secondary">
                  <a
                    href="/${url.short_code}"
                    target="_blank"
                    class="text-decoration-none text-primary fw-medium d-block mb-1"
                    ><i class="bi bi-link-45deg"></i> sho.rt/${
                      url.short_code
                    }</a
                  >
                  <span class="text-secondary" style="font-size: 0.8rem"
                    >Added ${date.toLocaleDateString()}</span
                  >
                </td>
                <td
                  class="py-3 border-secondary text-truncate"
                  style="max-width: 250px"
                >
                  <span class="text-light"
                    >${url.original_url}</span
                  >
                </td>
                <td class="text-center py-3 border-secondary">
                  <span
                    class="badge bg-dark border border-secondary text-light"
                    >${url.click_count}</span
                  >
                </td>
                <td class="text-end px-4 py-3 border-secondary">
                  <button
                    class="btn btn-sm btn-outline-secondary rounded-circle me-1"
                    title="Copy"
                  >
                    <i class="bi bi-clipboard"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-outline-secondary rounded-circle me-1"
                    title="QR Code"
                  >
                    <i class="bi bi-qr-code-scan"></i>
                  </button>
                </td>
              </tr>
            `;

            tableBody.innerHTML += tableRow;
          });

          const logoutBtn = document.getElementById("logout-button");
          logoutBtn.addEventListener("click", async () => {
            await fetch("/logout");
            window.location.reload();
          });
        }
      });
    </script>
  </body>
</html>
