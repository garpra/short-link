<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Short</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card shadow-lg">
        <div class="text-center mb-4">
          <a href="/" class="text-decoration-none fw-bold fs-3 text-light"
            >Shorter</a
          >
          <p class="text-secondary mt-2 mb-0">Welcome back</p>
        </div>

        <form>
          <div class="mb-3">
            <label class="form-label text-secondary small">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="name@email.com"
              required
            />
          </div>
          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <label class="form-label text-secondary small">Password</label>
              <a href="#" class="text-primary small text-decoration-none"
                >Forgot password?</a
              >
            </div>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
          <div id="error-message" class="text-danger text-center mb-3"></div>
          <button
            type="submit"
            class="btn btn-primary w-100 rounded-pill fw-medium mb-4"
          >
            Log In
          </button>

          <div class="text-center text-secondary small">
            Don't have an account?
            <a
              href="/signup"
              class="text-primary text-decoration-none fw-medium"
              >Sign up here</a
            >
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/login.js"></script>
  </body>
</html>
